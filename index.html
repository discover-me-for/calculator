<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Relationship Calculator 💕</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ff4d6d,#ff758f,#ffb3c1);
    position:relative;
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:rgba(255,255,255,0.7);
    animation:floatHearts linear infinite;
}

@keyframes floatHearts{
    0%{transform:translateY(100vh) scale(0.5);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-10vh) scale(1.5);opacity:0;}
}

/* Container */
.container{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    color:white;
    z-index:10;
}

/* ========== TITLE ANIMATIONS ========== */

/* FORWARD GRADIENT */
.forward-text{
    background:linear-gradient(90deg,#ffffff,#ff4d6d,#ffb3c1,#ff0000);
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:forwardMove 4s linear infinite;
    font-weight:bold;
}

@keyframes forwardMove{
    0%{background-position:0%;}
    100%{background-position:100%;}
}

/* REVERSE GRADIENT */
.reverse-text{
    background:linear-gradient(270deg,#ffffff,#ffb3c1,#ff4d6d,#fc0202);
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:reverseMove 4s linear infinite;
    font-weight:bold;
}

@keyframes reverseMove{
    0%{background-position:100%;}
    100%{background-position:0%;}
}

/* Input */
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:14px;
    font-size:16px;
}

/* Button */
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:14px;
    background:#ff3366;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

/* Result */
#result{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
    min-height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* Loader */
.loader{
    width:55px;
    height:55px;
    border:6px solid rgba(255,255,255,0.3);
    border-top:6px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.show{
    animation:pop 0.6s ease;
}

@keyframes pop{
    0%{transform:scale(0);opacity:0;}
    70%{transform:scale(1.1);}
    100%{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<div class="container">

    <!-- FORWARD SHADING -->
    <div class="forward-text" style="font-size:18px;margin-bottom:10px;">
        💕 Fill & Discover Heart Secret 💕
    </div>

    <!-- REVERSE SHADING -->
    <h1 class="reverse-text" style="font-size:23px;margin-bottom:20px;">
        💕 Relationship Calculator 💕
    </h1>

    <input type="text" id="name1" placeholder="Enter Your Name">
    <input type="text" id="name2" placeholder="Enter Partner Name">

    <button onclick="calculateLove()">Check Relationship</button>

    <div id="result"></div>

</div>

<script>

// Floating hearts
for(let i=0;i<35;i++){
    const h=document.createElement('div');
    h.className='heart';
    h.innerHTML='💖';
    h.style.left=Math.random()*100+'vw';
    h.style.fontSize=(15+Math.random()*25)+'px';
    h.style.animationDuration=(5+Math.random()*5)+'s';
    document.body.appendChild(h);
}

// EmailJS
emailjs.init('g2h59EgxytV-0tkHl');

// Outcomes
const outcomes=[
"Perfect Soulmates 💖","Romantic Couple ❤️","Made For Each Other 💍",
"Crazy In Love 😍","True Connection ✨","Strong Bond 🔥",
"Cute Couple 🥰","Endless Love 💞","Dream Pair 🌹",
"Perfect Match 💘","Future Couple 👩‍❤️‍👨","Power Couple 👑",
"Good Understanding 🙂","Friendship Vibes 🫶","Enimies 💬",
"Complicated Feelings 😶","Too Many Arguments ⚡","Not Meant To Be 💔"
];

function calculateLove(){

    const n1=document.getElementById('name1').value.trim();
    const n2=document.getElementById('name2').value.trim();
    const res=document.getElementById('result');

    if(!n1||!n2){
        alert("Enter both names");
        return;
    }

    res.innerHTML=`<div class="loader"></div>`;

    setTimeout(()=>{

        let hash=0;
        const combo=(n1+n2).toLowerCase();

        for(let i=0;i<combo.length;i++){
            hash+=combo.charCodeAt(i);
        }

        const final=outcomes[hash%outcomes.length];

        res.innerHTML=`<div class="show">💘 ${final}</div>`;

        emailjs.send('service_5alx7t2','template_s9ajiia',{
            name1:n1,
            name2:n2,
            result:final
        });

    },3000);
}

</script>

</body>
</html>
